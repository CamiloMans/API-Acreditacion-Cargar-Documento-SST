services:
  - type: web
    name: api-documentos-drive
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLIENT_SECRET_FILE
        sync: false
      - key: GOOGLE_TOKEN_FILE
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://myma-acreditacion.onrender.com,http://localhost:3000,http://127.0.0.1:3000
